<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme -->
    <meta name="theme-color" content="#6366f1" />

    <!-- SEO -->
    <title>WeatherPulse • Live Weather & News</title>

    <meta
      name="description"
      content="WeatherPulse provides real-time weather forecasts, hourly updates, 5-day forecasts, and trending global news in one beautiful dashboard."
    />

    <meta
      name="keywords"
      content="weather app, live weather, weather forecast, news app, weatherpulse, global news, climate, temperature"
    />

    <meta name="author" content="Ishan Rai" />

    <!-- Open Graph / WhatsApp / Discord -->
    <meta property="og:type" content="website" />

    <meta
      property="og:title"
      content="WeatherPulse • Live Weather & News"
    />

    <meta
      property="og:description"
      content="Check live weather forecasts and trending news updates worldwide with WeatherPulse."
    />

    <meta
      property="og:image"
      content="%PUBLIC_URL%/logo192.png"
    />

    <!-- Twitter -->
    <meta
      name="twitter:title"
      content="WeatherPulse • Live Weather & News"
    />

    <meta
      name="twitter:description"
      content="Real-time weather forecasts and top headlines worldwide."
    />

    <meta
      name="twitter:image"
      content="%PUBLIC_URL%/logo192.png"
    />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- PWA -->
    <link
      rel="apple-touch-icon"
      href="%PUBLIC_URL%/logo192.png"
    />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run WeatherPulse.</noscript>

    <div id="root"></div>
  </body>
</html>
